<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudan Junior Academy | Results Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: #064e3b;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(90deg, #064e3b 0%, #059669 5%, #10b981 10%, #059669 15%, #064e3b 20%);
            background-size: 200% 100%;
            animation: curtainWave 10s ease-in-out infinite;
            z-index: -1;
            opacity: 0.8;
        }

        @keyframes curtainWave {
            0% { background-position: 0% 0%; transform: skewX(0deg); }
            50% { background-position: 100% 0%; transform: skewX(2deg); }
            100% { background-position: 0% 0%; transform: skewX(0deg); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            width: 100%;
            max-width: 380px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-container { padding-top: 25px; text-align: center; background: white; }
        .school-logo { width: 70px; height: auto; margin-bottom: 5px; }
        .header-accent { background: #f8fafc; padding: 15px; text-align: center; border-bottom: 1px solid #edf2f7; }
        .header-accent h2 { font-size: 1.25rem; color: #dc3545; margin-bottom: 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .header-accent p { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
        .card-body { padding: 25px !important; }
        .search-box { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 12px; font-size: 0.9rem; transition: all 0.2s; }
        .search-box:focus { border-color: #dc3545; box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1); outline: none; }
        .btn-access { background-color: #059669; border: none; padding: 10px; font-size: 0.9rem; border-radius: 6px; transition: transform 0.1s; }
        .btn-access:active { transform: scale(0.98); }

        .grade-pill {
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.7rem;
        }
        
        /* CBC Grade Colors */
        .ee { background: #dcfce7; color: #166534; } /* Exceeding */
        .me { background: #dcf0fc; color: #0369a1; } /* Meeting */
        .ae { background: #fef9c3; color: #854d0e; } /* Approaching */
        .be { background: #fee2e2; color: #991b1b; } /* Below */

        #printArea { background: white; padding: 20px; }

        @media print {
            .modal-header, .modal-footer, .d-print-none { display: none !important; }
            .modal-content { border: none !important; }
            body { background: white !important; }
            body::before { display: none; }
        }
    </style>
</head>
<body>

<div class="login-card p-0">
    <div class="logo-container">
        <img src="logo.png" alt="Rudan Junior Academy" class="school-logo" onerror="this.src='https://via.placeholder.com/70?text=LOGO'">
    </div>

    <div class="header-accent">
        <h2 class="fw-bold">Rudan Junior Academy</h2>
        <p class="mb-0">Student Performance Portal</p>
    </div>
    
    <div class="card-body text-center">
        <p class="text-muted small mb-3">Enter admission number (e.g., RJA/001/2026)</p>
        <input type="text" id="admInput" class="form-control search-box mb-3 text-center" placeholder="RJA/___/2026" autocomplete="off">
        <button class="btn btn-success w-100 btn-access fw-bold shadow-sm" onclick="search()">
            <i class="fas fa-sign-in-alt me-2"></i>View Results
        </button>
        <div id="loader" class="mt-3 text-muted" style="font-size: 0.7rem;">
            <i class="fas fa-shield-alt me-1"></i> Checking Secure Portal...
        </div>
    </div>
</div>

<div class="modal fade" id="resultsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 8px;">
            <div class="modal-header bg-light border-0 px-4 py-2">
                <h6 class="modal-title fw-bold text-success"><i class="fas fa-file-invoice me-2"></i>CBC Performance Report</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body p-4" id="printArea">
                <div class="text-center mb-4 d-none d-print-block">
                     <h4 class="fw-bold text-danger">RUDAN JUNIOR ACADEMY</h4>
                     <p class="small text-muted">CBC Academic Record</p>
                     <hr>
                </div>

                <div class="row mb-3">
                    <div class="col-sm-6">
                        <label class="text-muted small text-uppercase fw-bold" style="font-size: 9px;">Student Name</label>
                        <h6 class="fw-bold text-dark mb-0" id="mStudentName"></h6>
                    </div>
                    <div class="col-sm-6 text-sm-end">
                        <label class="text-muted small text-uppercase fw-bold" style="font-size: 9px;">Admission No</label>
                        <h6 class="fw-bold text-muted mb-0" id="mStudentAdm"></h6>
                    </div>
                </div>

                <div class="row mb-3 text-center">
                    <div class="col-3">
                        <div class="p-2 bg-light rounded">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 8px;">Grade</small>
                            <span class="small fw-bold" id="mStudentClass">---</span>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="p-2 bg-light rounded">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 8px;">Total Score</small>
                            <span class="small fw-bold text-primary" id="mTotalScore">0</span>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="p-2 bg-light rounded">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 8px;">Position</small>
                            <span class="small fw-bold text-danger" id="mPosition">---</span>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="p-2 bg-light rounded">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 8px;">Period</small>
                            <span class="small fw-bold" id="mStudentTerm">---</span>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-sm table-hover align-middle" style="font-size: 0.85rem;">
                        <thead class="table-light">
                            <tr>
                                <th>Learning Area</th>
                                <th class="text-center">Score</th>
                                <th class="text-center">Performance Level</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="modal-footer border-0 px-4 pb-3">
                <button onclick="downloadPDF()" class="btn btn-sm btn-danger d-print-none">
                    <i class="fas fa-file-pdf me-2"></i>Download PDF
                </button>
                <button onclick="window.print()" class="btn btn-sm btn-outline-secondary d-print-none">
                    <i class="fas fa-print me-2"></i>Print
                </button>
                <button type="button" class="btn btn-sm btn-success px-3" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let resultsData = [];
    const myModal = new bootstrap.Modal(document.getElementById('resultsModal'));

    async function init() {
        const loader = document.getElementById('loader');
        try {
            const response = await fetch('results.json?v=' + new Date().getTime());
            if (!response.ok) throw new Error("Connection failed");
            const payload = await response.json();
            resultsData = payload.data || [];
            loader.innerHTML = '<i class="fas fa-check-circle text-success me-1"></i> Portal Ready';
        } catch (e) {
            loader.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i> Data Offline</span>';
        }
    }

    function search() {
        const input = document.getElementById('admInput').value.trim().toUpperCase();
        if (!input) { alert("Please enter an admission number."); return; }

        const student = resultsData.find(r => r.adm_no && r.adm_no.toUpperCase() === input);

        if (student) {
            document.getElementById('mStudentName').innerText = student.student_name;
            document.getElementById('mStudentAdm').innerText = student.adm_no;
            document.getElementById('mStudentClass').innerText = "Grade " + (student.class_id || 'N/A');
            document.getElementById('mTotalScore').innerText = student.total_score;
            document.getElementById('mPosition').innerText = student.position;
            document.getElementById('mStudentTerm').innerText = student.term + " " + student.year;

            const body = document.getElementById('tableBody');
            body.innerHTML = student.subjects.map(item => {
                // Determine color class based on CBC Grade
                const g = item.grade.toLowerCase();
                let cssClass = 'be';
                if (g.startsWith('ee')) cssClass = 'ee';
                else if (g.startsWith('me')) cssClass = 'me';
                else if (g.startsWith('ae')) cssClass = 'ae';

                return `
                <tr>
                    <td class="fw-bold">${item.name}</td>
                    <td class="text-center">${item.score}%</td>
                    <td class="text-center">
                        <span class="grade-pill ${cssClass}">
                            ${item.grade}
                        </span>
                    </td>
                </tr>`;
            }).join('');

            myModal.show();
        } else {
            alert("No results found for admission number: " + input);
        }
    }

    function downloadPDF() {
        const element = document.getElementById('printArea');
        const adm = document.getElementById('mStudentAdm').innerText.replace(/\//g, '_');
        const name = document.getElementById('mStudentName').innerText;
        const opt = {
            margin: 10,
            filename: `Report_${adm}_${name}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    document.getElementById('admInput').addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') search(); 
    });

    window.onload = init;
</script>
</body>
</html>
