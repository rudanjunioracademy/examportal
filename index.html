<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudan Junior Academy | Results Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(-45deg, #064e3b, #059669, #10b981, #134e4a);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            width: 100%;
            max-width: 400px; /* Reduced width for compactness */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .logo-container {
            padding-top: 20px;
            text-align: center;
            background: white;
        }

        .school-logo {
            width: 80px; /* Standard logo size */
            height: auto;
            margin-bottom: 10px;
        }

        .header-accent {
            background: #059669;
            color: white;
            padding: 20px 15px; /* Reduced padding */
            text-align: center;
        }

        .header-accent h2 {
            font-size: 1.4rem; /* Smaller heading */
        }

        .header-accent p {
            font-size: 0.85rem;
        }

        .search-box {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.95rem; /* Standard font size */
            transition: all 0.3s;
        }

        .search-box:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        /* CBC Grade Badges */
        .grade-pill {
            padding: 3px 10px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .ee { background: #dcfce7; color: #166534; }
        .me { background: #dcf0fc; color: #0369a1; }
        .ae { background: #fef9c3; color: #854d0e; }
        .be { background: #fee2e2; color: #991b1b; }

        .btn-access {
            padding: 10px;
            font-size: 0.95rem;
        }

        @media print {
            .modal-header, .modal-footer, .d-print-none { display: none !important; }
            .modal-content { border: none !important; }
        }
    </style>
</head>
<body>

<div class="login-card p-0">
    <div class="logo-container">
        <img src="logo.png" alt="Rudan Junior Academy" class="school-logo" onerror="this.src='https://via.placeholder.com/80?text=LOGO'">
    </div>

    <div class="header-accent">
        <h2 class="fw-bold mb-0">Rudan Junior Academy</h2>
        <p class="mb-0 opacity-75">Results Portal</p>
    </div>
    
    <div class="card-body p-4 text-center">
        <p class="text-muted small mb-3">Enter Admission Number to access report.</p>
        
        <input type="text" id="admInput" class="form-control search-box mb-3 text-center" placeholder="e.g. RJA/001/2026" autocomplete="off">
        
        <button class="btn btn-success w-100 btn-access fw-bold shadow-sm" onclick="search()">
            <i class="fas fa-search me-2"></i>Access Results
        </button>

        <div id="loader" class="smaller mt-3 text-muted" style="font-size: 0.75rem;">
            <i class="fas fa-circle-notch fa-spin me-1"></i> System Online
        </div>
    </div>
</div>

<div class="modal fade" id="resultsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
            <div class="modal-header bg-light border-0 px-4 py-2">
                <h6 class="modal-title fw-bold text-success"><i class="fas fa-graduation-cap me-2"></i>Performance Report</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4" id="printArea">
                <div class="row mb-3">
                    <div class="col-sm-6">
                        <label class="text-muted small text-uppercase fw-bold" style="font-size: 10px;">Student Name</label>
                        <h5 class="fw-bold text-dark mb-0" id="mStudentName"></h5>
                    </div>
                    <div class="col-sm-6 text-sm-end">
                        <label class="text-muted small text-uppercase fw-bold" style="font-size: 10px;">Admission No</label>
                        <h5 class="fw-bold text-muted mb-0" id="mStudentAdm"></h5>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-4">
                        <div class="p-2 bg-light rounded text-center">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 9px;">Class</small>
                            <span class="small fw-bold text-dark" id="mStudentClass">---</span>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-2 bg-light rounded text-center">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 9px;">Term</small>
                            <span class="small fw-bold text-dark" id="mStudentTerm">---</span>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-2 bg-light rounded text-center">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 9px;">Exam</small>
                            <span class="small fw-bold text-dark" id="mExamType">---</span>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-sm table-hover align-middle" style="font-size: 0.9rem;">
                        <thead class="table-light">
                            <tr>
                                <th>Learning Area</th>
                                <th class="text-center">Score</th>
                                <th class="text-center">Grade</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer border-0 px-4 pb-3">
                <button onclick="window.print()" class="btn btn-sm btn-outline-secondary d-print-none">
                    <i class="fas fa-print me-2"></i>Print
                </button>
                <button type="button" class="btn btn-sm btn-success px-3" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let resultsData = [];
    const myModal = new bootstrap.Modal(document.getElementById('resultsModal'));

    async function init() {
        try {
            const response = await fetch(`results.json?v=${new Date().getTime()}`);
            if (!response.ok) throw new Error();
            resultsData = await response.json();
        } catch (e) {
            document.getElementById('loader').innerHTML = '<span class="text-danger">Offline</span>';
        }
    }

    function search() {
        const input = document.getElementById('admInput').value.trim().toUpperCase();
        if (!input) return;

        const filtered = resultsData.filter(r => r.adm_no && r.adm_no.toUpperCase() === input);

        if (filtered.length > 0) {
            const first = filtered[0];
            
            document.getElementById('mStudentName').innerText = first.student_name;
            document.getElementById('mStudentAdm').innerText = first.adm_no;
            document.getElementById('mStudentClass').innerText = first.current_class || 'N/A';
            document.getElementById('mStudentTerm').innerText = `${first.term} ${first.year}`;
            document.getElementById('mExamType').innerText = first.exam_type || 'Main Exam';

            const body = document.getElementById('tableBody');
            body.innerHTML = filtered.map(item => `
                <tr>
                    <td class="fw-bold text-dark">${item.subject}</td>
                    <td class="text-center">${item.score}%</td>
                    <td class="text-center">
                        <span class="grade-pill ${(item.grade || 'be').toLowerCase()}">
                            ${item.grade}
                        </span>
                    </td>
                </tr>
            `).join('');

            myModal.show();
        } else {
            alert("No records found for that Admission Number.");
        }
    }

    document.getElementById('admInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
    init();
</script>
</body>
</html>
