<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudan Junior Academy | Results Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Curtain folding animation */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: #064e3b;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                #064e3b 0%,
                #059669 5%,
                #10b981 10%,
                #059669 15%,
                #064e3b 20%
            );
            background-size: 200% 100%;
            animation: curtainWave 10s ease-in-out infinite;
            z-index: -1;
            opacity: 0.8;
        }

        @keyframes curtainWave {
            0% { background-position: 0% 0%; transform: skewX(0deg); }
            50% { background-position: 100% 0%; transform: skewX(2deg); }
            100% { background-position: 0% 0%; transform: skewX(0deg); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            width: 100%;
            max-width: 380px; /* Compact standard size */
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-container {
            padding-top: 25px;
            text-align: center;
            background: white;
        }

        .school-logo {
            width: 70px; /* Standard size */
            height: auto;
            margin-bottom: 5px;
        }

        .header-accent {
            background: #f8fafc; /* Light neutral to let red text pop */
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
        }

        .header-accent h2 {
            font-size: 1.25rem;
            color: #dc3545; /* Specific Red Color */
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-accent p {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2px;
        }

        .card-body {
            padding: 25px !important;
        }

        .search-box {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-box:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
            outline: none;
        }

        .btn-access {
            background-color: #059669;
            border: none;
            padding: 10px;
            font-size: 0.9rem;
            border-radius: 6px;
            transition: transform 0.1s;
        }

        .btn-access:active {
            transform: scale(0.98);
        }

        /* CBC Grade Badges */
        .grade-pill {
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.65rem;
            text-transform: uppercase;
        }
        .ee { background: #dcfce7; color: #166534; }
        .me { background: #dcf0fc; color: #0369a1; }
        .ae { background: #fef9c3; color: #854d0e; }
        .be { background: #fee2e2; color: #991b1b; }

        @media print {
            .modal-header, .modal-footer, .d-print-none { display: none !important; }
            .modal-content { border: none !important; }
        }
    </style>
</head>
<body>

<div class="login-card p-0">
    <div class="logo-container">
        <img src="logo.png" alt="Rudan Junior Academy" class="school-logo" onerror="this.src='https://via.placeholder.com/70?text=LOGO'">
    </div>

    <div class="header-accent">
        <h2 class="fw-bold">Rudan Junior Academy</h2>
        <p class="mb-0">Student Performance Portal</p>
    </div>
    
    <div class="card-body text-center">
        <p class="text-muted small mb-3">Enter admission number to continue</p>
        
        <input type="text" id="admInput" class="form-control search-box mb-3 text-center" placeholder="RJA/000/2026" autocomplete="off">
        
        <button class="btn btn-success w-100 btn-access fw-bold shadow-sm" onclick="search()">
            <i class="fas fa-sign-in-alt me-2"></i>View Results
        </button>

        <div id="loader" class="mt-3 text-muted" style="font-size: 0.7rem;">
            <i class="fas fa-shield-alt me-1"></i> Secure Access
        </div>
    </div>
</div>

<div class="modal fade" id="resultsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 8px;">
            <div class="modal-header bg-light border-0 px-4 py-2">
                <h6 class="modal-title fw-bold text-success"><i class="fas fa-file-invoice me-2"></i>Academic Report</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4" id="printArea">
                <div class="row mb-3">
                    <div class="col-sm-6">
                        <label class="text-muted small text-uppercase fw-bold" style="font-size: 9px;">Student</label>
                        <h6 class="fw-bold text-dark mb-0" id="mStudentName"></h6>
                    </div>
                    <div class="col-sm-6 text-sm-end">
                        <label class="text-muted small text-uppercase fw-bold" style="font-size: 9px;">Admission No</label>
                        <h6 class="fw-bold text-muted mb-0" id="mStudentAdm"></h6>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-4">
                        <div class="p-2 bg-light rounded text-center">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 8px;">Class</small>
                            <span class="small fw-bold" id="mStudentClass">---</span>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-2 bg-light rounded text-center">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 8px;">Term</small>
                            <span class="small fw-bold" id="mStudentTerm">---</span>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-2 bg-light rounded text-center">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 8px;">Exam</small>
                            <span class="small fw-bold" id="mExamType">---</span>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-sm table-hover align-middle" style="font-size: 0.85rem;">
                        <thead class="table-light">
                            <tr>
                                <th>Subject</th>
                                <th class="text-center">Score</th>
                                <th class="text-center">Grade</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer border-0 px-4 pb-3">
                <button onclick="window.print()" class="btn btn-sm btn-outline-secondary d-print-none">
                    <i class="fas fa-print me-2"></i>Print
                </button>
                <button type="button" class="btn btn-sm btn-success px-3" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let resultsData = [];
    const myModal = new bootstrap.Modal(document.getElementById('resultsModal'));

    async function init() {
        try {
            const response = await fetch(`results.json?v=${new Date().getTime()}`);
            if (!response.ok) throw new Error();
            resultsData = await response.json();
        } catch (e) {
            document.getElementById('loader').innerHTML = '<span class="text-danger">Sync Error</span>';
        }
    }

    function search() {
        const input = document.getElementById('admInput').value.trim().toUpperCase();
        if (!input) return;

        const filtered = resultsData.filter(r => r.adm_no && r.adm_no.toUpperCase() === input);

        if (filtered.length > 0) {
            const first = filtered[0];
            
            document.getElementById('mStudentName').innerText = first.student_name;
            document.getElementById('mStudentAdm').innerText = first.adm_no;
            document.getElementById('mStudentClass').innerText = first.current_class || 'N/A';
            document.getElementById('mStudentTerm').innerText = `${first.term} ${first.year}`;
            document.getElementById('mExamType').innerText = first.exam_type || 'Final';

            const body = document.getElementById('tableBody');
            body.innerHTML = filtered.map(item => `
                <tr>
                    <td class="fw-bold">${item.subject}</td>
                    <td class="text-center">${item.score}%</td>
                    <td class="text-center">
                        <span class="grade-pill ${(item.grade || 'be').toLowerCase()}">
                            ${item.grade}
                        </span>
                    </td>
                </tr>
            `).join('');

            myModal.show();
        } else {
            alert("Record not found. Please check the Admission Number.");
        }
    }

    document.getElementById('admInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
    init();
</script>
</body>
</html>
